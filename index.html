<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RameNiku</title>
  <meta name="description" content="RameNiku - indie game dev profile." />
  <style>
    @font-face {
      font-family: "RamePixel";
      src: url("assets/fonts/pixel.ttf") format("truetype");
      font-display: swap;
    }

    :root {
      --bg: #1f1f1f;
      --bg-deep: #171717;
      --fg: #f4f4f4;
      --muted: #aaa;
      --dim: #747474;
      --line: #f1f1f1;
      --panel: rgba(255,255,255,.018);
      --glow: rgba(255,255,255,.34);
      --glow-soft: rgba(255,255,255,.14);
      --shadow: rgba(0,0,0,.65);
    }

    * { box-sizing: border-box; }

    html {
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "RamePixel", "Lucida Console", "Courier New", monospace;
      image-rendering: pixelated;
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 50% 6%, rgba(255,255,255,.07), transparent 14rem),
        radial-gradient(circle at 22% 74%, rgba(255,255,255,.035), transparent 24rem),
        radial-gradient(circle at 78% 82%, rgba(255,255,255,.03), transparent 22rem),
        linear-gradient(180deg, #202020 0%, #1b1b1b 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* Ethereal pixel haze, inspired by the profile picture glow. */
    body::before {
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.018) 1px, transparent 1px);
      background-size: 6px 6px;
      opacity: .23;
      mix-blend-mode: screen;
    }

    body::after {
      background:
        radial-gradient(circle at 50% 19%, rgba(255,255,255,.065), transparent 10rem),
        radial-gradient(circle at 50% 50%, transparent 0, rgba(0,0,0,.22) 54rem);
      opacity: .9;
    }

    a { color: inherit; }

    .page {
      position: relative;
      z-index: 1;
      width: min(1180px, calc(100% - 34px));
      margin: 0 auto;
      padding: clamp(28px, 5vw, 54px) 0 54px;
      text-align: center;
    }

    .avatar-wrap {
      width: clamp(138px, 17vw, 188px);
      aspect-ratio: 1;
      margin: 0 auto 18px;
      border: 6px solid var(--line);
      background: #171717;
      padding: 6px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,.08),
        0 0 26px var(--glow-soft),
        0 16px 34px var(--shadow);
      overflow: hidden;
    }

    .avatar {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: grayscale(1) contrast(1.18) brightness(1.03) drop-shadow(0 0 10px var(--glow));
    }

    h1 {
      margin: 0;
      font-size: clamp(2.8rem, 7vw, 4.7rem);
      line-height: .94;
      letter-spacing: .02em;
      text-shadow:
        0 0 7px var(--glow),
        0 0 22px var(--glow-soft),
        4px 4px 0 rgba(0,0,0,.45);
    }

    .block-title {
      margin: clamp(48px, 7vw, 76px) 0 16px;
      font-size: clamp(1.8rem, 4vw, 2.65rem);
      line-height: 1;
      letter-spacing: .04em;
      text-shadow: 0 0 9px var(--glow-soft), 3px 3px 0 rgba(0,0,0,.5);
    }

    .about {
      max-width: 930px;
      margin: 0 auto;
      color: var(--muted);
      font-size: clamp(1.25rem, 3.1vw, 2.08rem);
      line-height: 1.18;
      letter-spacing: .035em;
      text-shadow: 0 0 7px rgba(255,255,255,.1);
    }

    .games {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: clamp(18px, 3vw, 34px);
      margin: 26px auto 0;
      max-width: 980px;
    }

    .game-card {
      min-height: 142px;
      border: 3px solid var(--line);
      background: var(--panel);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 18px;
      text-decoration: none;
      box-shadow:
        inset 0 0 18px rgba(255,255,255,.018),
        0 0 18px rgba(255,255,255,.035);
      transition: transform .08s linear, background .08s linear, box-shadow .08s linear;
    }

    a.game-card:hover,
    a.game-card:focus-visible {
      transform: translateY(-3px);
      background: rgba(255,255,255,.045);
      box-shadow:
        inset 0 0 20px rgba(255,255,255,.035),
        0 0 26px rgba(255,255,255,.12);
    }

    .game-title {
      color: var(--fg);
      font-size: clamp(1.35rem, 3vw, 2rem);
      line-height: 1;
      margin-bottom: 20px;
      text-shadow: 0 0 8px var(--glow-soft);
    }

    .download-box {
      display: inline-flex;
      min-width: 170px;
      min-height: 42px;
      align-items: center;
      justify-content: center;
      border: 3px solid var(--line);
      color: var(--muted);
      padding: 0 16px;
      font-size: clamp(1rem, 2vw, 1.25rem);
      background: #252525;
      box-shadow: 0 0 12px rgba(255,255,255,.06);
    }

    .soon {
      color: var(--muted);
      font-size: clamp(1.45rem, 3vw, 2.05rem);
      line-height: 1.25;
      text-shadow: 0 0 8px rgba(255,255,255,.08);
    }

    .footer {
      margin-top: 44px;
      color: var(--dim);
      font-size: .95rem;
      line-height: 1.6;
    }

    @media (max-width: 820px) {
      .games { grid-template-columns: 1fr; max-width: 430px; }
      .game-card { min-height: 128px; }
      .about { max-width: 700px; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="avatar-wrap" aria-label="RameNiku profile picture">
      <img class="avatar" src="assets/profile.png" alt="Monochrome glowing pixel portrait" />
    </div>

    <h1>RameNiku</h1>

    <section aria-labelledby="about-title">
      <h2 class="block-title" id="about-title">about me</h2>
      <p class="about">I'm an indie game dev that loves monochrome pixel style, dungeon crawlers, technical games and grind rogue-likes.</p>
    </section>

    <section aria-labelledby="games-title">
      <h2 class="block-title" id="games-title">my games</h2>
      <div class="games">
        <a class="game-card" href="https://rameniku.github.io/3Doors-Game/" target="_blank" rel="noopener">
          <span class="game-title">3Doors</span>
          <span class="download-box">Download</span>
        </a>

        <div class="game-card" aria-label="Future game slot">
          <span class="soon">Soon to<br />come...</span>
        </div>

        <div class="game-card" aria-label="Future game slot">
          <span class="soon">Soon to<br />come...</span>
        </div>
      </div>
    </section>

    <footer class="footer">monochrome dreams / bad decisions / doors that probably hate you</footer>
  </main>
</body>
</html>
